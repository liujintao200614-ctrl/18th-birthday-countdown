<!DOCTYPE html>
<html lang="zh-CN" data-theme="strawberry">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✨ 18岁生日倒计时 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ---------- 主题变量 ---------- */
  :root {
    --font-display: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
    --font-num: 'Baloo 2', 'ZCOOL KuaiLe', sans-serif;
    --font-body: 'Noto Sans SC', sans-serif;
  }
  html[data-theme="strawberry"] {
    --bg-a: #ffe3ef; --bg-b: #ffd1e3; --bg-c: #fff4f9;
    --card: #ffffff; --card-border: #ffc2da;
    --text: #a8385f; --text-soft: #cf7a9a;
    --accent: #ff6fa5; --accent-deep: #f04d8a;
    --shadow: rgba(240, 77, 138, 0.25);
    --bar-track: #ffd8e8;
  }
  html[data-theme="starry"] {
    --bg-a: #e8e0ff; --bg-b: #d4c8ff; --bg-c: #f4efff;
    --card: #ffffff; --card-border: #d0bdff;
    --text: #5b3fa8; --text-soft: #937fce;
    --accent: #8f6fff; --accent-deep: #6f4de0;
    --shadow: rgba(111, 77, 224, 0.25);
    --bar-track: #e3d8ff;
  }
  html[data-theme="peach"] {
    --bg-a: #ffe9d6; --bg-b: #ffd9c4; --bg-c: #fff5ec;
    --card: #ffffff; --card-border: #ffcfae;
    --text: #b05a2a; --text-soft: #d68c5f;
    --accent: #ff9457; --accent-deep: #f2762e;
    --shadow: rgba(242, 118, 46, 0.25);
    --bar-track: #ffe0c9;
  }
  html[data-theme="mint"] {
    --bg-a: #dcf7ea; --bg-b: #c5f0dd; --bg-c: #f0fdf7;
    --card: #ffffff; --card-border: #a8e6c9;
    --text: #1f7a52; --text-soft: #6bbd97;
    --accent: #3ecf8e; --accent-deep: #21b374;
    --shadow: rgba(33, 179, 116, 0.25);
    --bar-track: #d2f3e3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text);
    background:
      radial-gradient(circle at 15% 20%, var(--bg-a) 0%, transparent 55%),
      radial-gradient(circle at 85% 75%, var(--bg-b) 0%, transparent 55%),
      var(--bg-c);
    overflow-x: hidden;
    transition: color .5s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 圆点波点纹理背景 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(var(--card-border) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    opacity: .35;
    pointer-events: none;
    z-index: 0;
  }

  /* ---------- 飘落装饰 ---------- */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .particle {
    position: absolute;
    top: -8vh;
    animation: fall linear infinite;
    user-select: none;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(360deg); }
  }

  /* ---------- 主题切换器 ---------- */
  .theme-switcher {
    position: relative;
    z-index: 5;
    margin-top: 24px;
    display: flex;
    gap: 10px;
    background: rgba(255,255,255,.65);
    backdrop-filter: blur(8px);
    padding: 8px 14px;
    border-radius: 999px;
    border: 2px solid var(--card-border);
    box-shadow: 0 6px 20px var(--shadow);
    transition: border-color .5s, box-shadow .5s;
  }
  .theme-btn {
    border: none;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 14px;
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 999px;
    background: transparent;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .3s;
  }
  .theme-btn .dot {
    width: 14px; height: 14px; border-radius: 50%;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.12);
  }
  .theme-btn[data-set="strawberry"] .dot { background: #ff6fa5; }
  .theme-btn[data-set="starry"]     .dot { background: #8f6fff; }
  .theme-btn[data-set="peach"]      .dot { background: #ff9457; }
  .theme-btn[data-set="mint"]       .dot { background: #3ecf8e; }
  .theme-btn:hover { transform: translateY(-2px) scale(1.05); color: var(--text); }
  .theme-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px var(--shadow);
  }

  /* ---------- 主内容 ---------- */
  main {
    position: relative;
    z-index: 5;
    width: min(860px, 92vw);
    text-align: center;
    padding: 6vh 0 8vh;
    animation: rise .9s ease both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(26px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .subtitle {
    font-family: var(--font-display);
    font-size: clamp(16px, 2.4vw, 22px);
    color: var(--text-soft);
    letter-spacing: 6px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(30px, 6vw, 56px);
    margin: 10px 0 6px;
    line-height: 1.3;
    text-shadow: 3px 3px 0 var(--bar-track);
  }
  #girl-name {
    color: var(--accent-deep);
    border-bottom: 3px dashed var(--accent);
    padding: 0 6px;
    cursor: text;
    outline: none;
    transition: background .3s;
  }
  #girl-name:hover { background: var(--bar-track); border-radius: 8px; }

  .date-line {
    font-size: clamp(13px, 1.8vw, 16px);
    color: var(--text-soft);
    margin-bottom: 4vh;
  }

  .cake {
    display: inline-block;
    cursor: pointer;
    font-size: clamp(40px, 7vw, 64px);
    animation: bounce 2.2s ease-in-out infinite;
    filter: drop-shadow(0 8px 14px var(--shadow));
    transition: transform .2s;
  }
  .cake:active { transform: scale(.85); }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-10px) rotate(4deg); }
  }
  .cake-hint {
    font-size: 12px;
    color: var(--text-soft);
    margin: 6px 0 3vh;
    opacity: .8;
  }

  /* ---------- 倒计时卡片 ---------- */
  .countdown {
    display: flex;
    justify-content: center;
    gap: clamp(10px, 2.5vw, 24px);
    flex-wrap: wrap;
  }
  .unit {
    background: var(--card);
    border: 3px solid var(--card-border);
    border-radius: 26px;
    width: clamp(76px, 18vw, 150px);
    padding: clamp(14px, 2.4vw, 26px) 0 clamp(10px, 1.8vw, 18px);
    box-shadow: 0 10px 24px var(--shadow), inset 0 -6px 0 var(--bar-track);
    transition: border-color .5s, box-shadow .5s, transform .3s;
    position: relative;
  }
  @media (hover: hover) and (pointer: fine) {
    .unit:hover { transform: translateY(-6px) rotate(-1.5deg); }
    .unit:nth-child(even):hover { transform: translateY(-6px) rotate(1.5deg); }
  }
  .unit:active,
  .unit.touch-active { transform: translateY(-6px) rotate(-1.5deg) scale(.97); }
  .unit:nth-child(even):active,
  .unit:nth-child(even).touch-active { transform: translateY(-6px) rotate(1.5deg) scale(.97); }
  .unit::after {
    content: attr(data-deco);
    position: absolute;
    top: -14px; right: -8px;
    font-size: 22px;
    transform: rotate(15deg);
  }
  .unit .num {
    font-family: var(--font-num);
    font-weight: 800;
    font-size: clamp(34px, 6.5vw, 64px);
    line-height: 1.05;
    color: var(--accent-deep);
    display: block;
  }
  .unit .num.pop { animation: pop .35s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  .unit .label {
    font-family: var(--font-display);
    font-size: clamp(13px, 1.8vw, 17px);
    color: var(--text-soft);
    letter-spacing: 3px;
  }

  /* ---------- 进度条 ---------- */
  .progress-wrap {
    margin: 6vh auto 0;
    width: min(560px, 88vw);
  }
  .progress-label {
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--text-soft);
    margin-bottom: 12px;
  }
  .progress-label b { color: var(--accent-deep); font-size: 18px; }
  .bar {
    position: relative;
    height: 22px;
    background: var(--bar-track);
    border-radius: 999px;
    border: 2px solid var(--card-border);
    overflow: visible;
  }
  .bar-fill {
    height: 100%;
    border-radius: 999px;
    background: repeating-linear-gradient(
      -45deg,
      var(--accent) 0 12px,
      var(--accent-deep) 12px 24px
    );
    background-size: 34px 34px;
    animation: candy 1.2s linear infinite;
    transition: width 1s ease;
    min-width: 22px;
  }
  @keyframes candy { to { background-position: 34px 0; } }
  .bar-runner {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -58%);
    font-size: 30px;
    transition: left 1s ease;
    filter: drop-shadow(0 4px 6px var(--shadow));
  }

  .blessing {
    margin-top: 6vh;
    font-family: var(--font-display);
    font-size: clamp(15px, 2.2vw, 19px);
    color: var(--text-soft);
    line-height: 2;
  }

  /* ---------- 庆祝态 ---------- */
  .celebrate-title {
    display: none;
    font-family: var(--font-display);
    font-size: clamp(34px, 7vw, 64px);
    color: var(--accent-deep);
    margin: 4vh 0;
    animation: bounce 1.4s ease-in-out infinite;
  }
  body.done .celebrate-title { display: block; }
  body.done .countdown, body.done .progress-wrap, body.done .subtitle { display: none; }

  /* ---------- 撒花 ---------- */
  .confetti {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    animation: confetti-fall ease-in forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--cx), 105vh) rotate(720deg); opacity: .85; }
  }

  /* ---------- 惊喜解锁 ---------- */
  .surprise {
    position: fixed; inset: 0; z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 20px;
    background: radial-gradient(circle at 50% 38%, #ffffff 0%, var(--bg-b) 55%, var(--bg-a) 100%);
    overflow: hidden;
  }
  .surprise.show { display: flex; animation: fadeIn .5s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .surprise-stage { display: none; position: relative; z-index: 3; width: min(560px, 92vw); }
  .surprise-stage.active { display: block; animation: rise .6s ease both; }

  .surprise .mascot {
    font-size: clamp(70px, 18vw, 120px);
    display: inline-block;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 12px 20px var(--shadow));
  }
  .surprise .big {
    font-family: var(--font-display);
    font-size: clamp(24px, 5vw, 40px);
    color: var(--accent-deep);
    margin: 18px 0 10px;
    line-height: 1.4;
  }
  .surprise .sub {
    font-family: var(--font-display);
    font-size: clamp(15px, 2.6vw, 20px);
    color: var(--text-soft);
  }

  /* 名字雨 */
  .name-rain { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .name-rain span {
    position: absolute;
    top: -14vh;
    font-family: var(--font-display);
    font-weight: 800;
    white-space: nowrap;
    will-change: transform, opacity;
    animation: name-fall linear infinite;
    text-shadow: 0 2px 8px rgba(255,255,255,.6);
  }
  @keyframes name-fall {
    0% {
      transform: translate(0, 0) rotate(var(--r0)) scale(.5);
      opacity: 0;
    }
    10% {
      opacity: var(--op);
      transform: translate(calc(var(--sway) * .1), 11vh) rotate(calc(var(--r0) * .6)) scale(1);
    }
    55% {
      transform: translate(calc(var(--sway) * -.6), 62vh) rotate(var(--r1)) scale(1);
      opacity: var(--op);
    }
    100% {
      transform: translate(var(--sway), 118vh) rotate(calc(var(--r1) * -1)) scale(.94);
      opacity: calc(var(--op) * .75);
    }
  }

  /* 画面震动 */
  .surprise.shake { animation: screen-shake .6s ease-in-out; }
  @keyframes screen-shake {
    0%, 100% { transform: translate(0, 0); }
    12% { transform: translate(-7px, 3px) rotate(-.5deg); }
    25% { transform: translate(6px, -4px) rotate(.5deg); }
    38% { transform: translate(-5px, -3px); }
    50% { transform: translate(5px, 4px) rotate(.4deg); }
    63% { transform: translate(-4px, 2px); }
    76% { transform: translate(3px, -2px) rotate(-.3deg); }
    88% { transform: translate(-2px, 1px); }
  }

  /* 成功卡片 */
  .surprise-card {
    background: var(--card);
    border: 3px solid var(--card-border);
    border-radius: 28px;
    padding: clamp(26px, 5vw, 42px);
    box-shadow: 0 16px 40px var(--shadow), inset 0 -6px 0 var(--bar-track);
  }
  .surprise-card h3 {
    font-family: var(--font-display);
    font-size: clamp(24px, 5vw, 38px);
    color: var(--accent-deep);
    margin-bottom: 12px;
  }
  .surprise-card p {
    font-family: var(--font-display);
    color: var(--text-soft);
    font-size: clamp(15px, 2.6vw, 20px);
    line-height: 1.8;
    margin-bottom: 26px;
  }
  .enter-btn {
    border: none; cursor: pointer;
    font-family: var(--font-display);
    font-size: clamp(15px, 2.6vw, 18px);
    color: #fff;
    background: var(--accent);
    padding: 13px 30px;
    border-radius: 999px;
    box-shadow: 0 8px 20px var(--shadow);
    transition: transform .2s, box-shadow .2s;
  }
  .enter-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 26px var(--shadow); }
  .enter-btn:active { transform: scale(.95); }

  footer {
    position: relative;
    z-index: 5;
    padding-bottom: 30px;
    font-size: 12px;
    color: var(--text-soft);
    opacity: .75;
  }

  /* ---------- 手机适配 ---------- */
  @media (max-width: 480px) {
    .theme-switcher {
      gap: 2px;
      padding: 6px 8px;
      width: min(94vw, 400px);
      justify-content: center;
    }
    .theme-btn { font-size: 12px; padding: 6px 8px; gap: 4px; }
    .theme-btn .dot { width: 11px; height: 11px; }
  }
  @media (max-width: 400px) {
    .countdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: min(320px, 88vw);
      margin: 0 auto;
    }
    .unit { width: auto; }
  }
</style>
</head>
<body>

<div id="particles"></div>

<nav class="theme-switcher" aria-label="切换主题">
  <button class="theme-btn active" data-set="strawberry"><span class="dot"></span>草莓奶油</button>
  <button class="theme-btn" data-set="starry"><span class="dot"></span>星黛紫梦</button>
  <button class="theme-btn" data-set="peach"><span class="dot"></span>蜜桃汽水</button>
  <button class="theme-btn" data-set="mint"><span class="dot"></span>薄荷软糖</button>
</nav>

<main>
  <span class="cake" id="cake" title="点我撒花!">🎂</span>
  <p class="cake-hint">(点一下蛋糕有惊喜哦)</p>

  <p class="subtitle">・ 距 离 ・</p>
  <h1><span id="girl-name" contenteditable="true" spellcheck="false">小可爱</span> 的 18 岁生日</h1>
  <p class="date-line">2026 年 9 月 28 日 · 点击名字可以改成她的名字哦</p>

  <h2 class="celebrate-title">🎉 生日快乐!欢迎来到 18 岁 🎉</h2>

  <div class="countdown" id="countdown">
    <div class="unit" data-deco="🎀"><span class="num" id="d">--</span><span class="label">天</span></div>
    <div class="unit" data-deco="💗"><span class="num" id="h">--</span><span class="label">时</span></div>
    <div class="unit" data-deco="🌟"><span class="num" id="m">--</span><span class="label">分</span></div>
    <div class="unit" data-deco="🍬"><span class="num" id="s">--</span><span class="label">秒</span></div>
  </div>

  <div class="progress-wrap">
    <p class="progress-label">17 岁的旅程已经走过 <b id="pct">0%</b> 啦</p>
    <div class="bar">
      <div class="bar-fill" id="bar-fill" style="width:0%"></div>
      <span class="bar-runner" id="runner" style="left:0%">🏃‍♀️</span>
    </div>
  </div>

  <p class="blessing">
    愿你的 18 岁,像草莓蛋糕一样甜,<br>
    像夏天的汽水一样冒着快乐的泡泡 🥂
  </p>
</main>

<footer>用心做给最好的朋友 💝</footer>

<div class="surprise" id="surprise">
  <div class="name-rain" id="name-rain"></div>

  <div class="surprise-stage" data-stage="1">
    <span class="mascot">🐥</span>
    <p class="big">哇!你居然知道她的名字! 🥰</p>
    <p class="sub">准备好了吗?惊喜要来啦~</p>
  </div>

  <div class="surprise-stage" data-stage="2">
    <span class="mascot">🎁</span>
    <p class="big">胡紫仙</p>
    <p class="sub">正在为你解锁专属惊喜…</p>
  </div>

  <div class="surprise-stage" data-stage="3">
    <div class="surprise-card">
      <h3>✨ 惊喜解锁成功!</h3>
      <p>愿你的 18 岁,<br>充满快乐与幸运! 🥳</p>
      <button class="enter-btn" id="enter-btn">← 返回倒计时</button>
    </div>
  </div>
</div>

<script>
  /* ================= 配置 ================= */
  const TARGET = new Date('2026-09-28T00:00:00+08:00'); // 18 岁生日
  const START  = new Date('2025-09-28T00:00:00+08:00'); // 17 岁生日(进度条起点)

  /* ================= 主题 ================= */
  const THEME_PARTICLES = {
    strawberry: ['🍓', '💗', '🎀', '🌸', '🧁'],
    starry:     ['⭐', '🌙', '💜', '✨', '🔮'],
    peach:      ['🍑', '🧋', '🍊', '🫧', '🍹'],
    mint:       ['🌿', '🍬', '🐸', '🍏', '🫶'],
  };
  const html = document.documentElement;
  const buttons = document.querySelectorAll('.theme-btn');

  function setTheme(name) {
    html.dataset.theme = name;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.set === name));
    localStorage.setItem('bday-theme', name);
    spawnParticles(name);
  }
  buttons.forEach(b => b.addEventListener('click', () => setTheme(b.dataset.set)));

  /* ================= 飘落装饰 ================= */
  const particleBox = document.getElementById('particles');
  function spawnParticles(theme) {
    particleBox.innerHTML = '';
    const icons = THEME_PARTICLES[theme];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      p.textContent = icons[i % icons.length];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (14 + Math.random() * 20) + 'px';
      p.style.animationDuration = (9 + Math.random() * 14) + 's';
      p.style.animationDelay = (-Math.random() * 20) + 's';
      p.style.opacity = .4 + Math.random() * .5;
      particleBox.appendChild(p);
    }
  }

  /* ================= 移动端触摸反馈 ================= */
  document.addEventListener('touchstart', () => {}, { passive: true }); // 激活 iOS 的 :active 样式
  document.querySelectorAll('.unit').forEach(unit => {
    const activate = () => unit.classList.add('touch-active');
    const deactivate = () => unit.classList.remove('touch-active');
    unit.addEventListener('touchstart', activate, { passive: true });
    unit.addEventListener('touchend', deactivate);
    unit.addEventListener('touchcancel', deactivate);
  });

  /* ================= 倒计时 ================= */
  const el = { d: byId('d'), h: byId('h'), m: byId('m'), s: byId('s') };
  function byId(id) { return document.getElementById(id); }
  function pad(n) { return String(n).padStart(2, '0'); }

  function setNum(node, val) {
    if (node.textContent !== val) {
      node.textContent = val;
      node.classList.remove('pop');
      void node.offsetWidth; // 重新触发动画
      node.classList.add('pop');
    }
  }

  let celebrated = false;
  function tick() {
    const now = new Date();
    let diff = TARGET - now;

    if (diff <= 0) {
      document.body.classList.add('done');
      if (!celebrated) { celebrated = true; burstConfetti(160); }
      setNum(el.d, '0'); setNum(el.h, '00'); setNum(el.m, '00'); setNum(el.s, '00');
      return;
    }

    const day = Math.floor(diff / 86400000);
    const hr  = Math.floor(diff / 3600000) % 24;
    const min = Math.floor(diff / 60000) % 60;
    const sec = Math.floor(diff / 1000) % 60;
    setNum(el.d, String(day));
    setNum(el.h, pad(hr));
    setNum(el.m, pad(min));
    setNum(el.s, pad(sec));

    const pct = Math.min(100, Math.max(0, (now - START) / (TARGET - START) * 100));
    byId('pct').textContent = pct.toFixed(1) + '%';
    byId('bar-fill').style.width = pct + '%';
    byId('runner').style.left = pct + '%';
  }
  tick();
  setInterval(tick, 1000);

  /* ================= 撒花 ================= */
  const CONFETTI_COLORS = ['#ff6fa5', '#8f6fff', '#ff9457', '#3ecf8e', '#ffd93d', '#6ec6ff'];
  function burstConfetti(count = 90) {
    for (let i = 0; i < count; i++) {
      const c = document.createElement('span');
      c.className = 'confetti';
      const isEmoji = Math.random() < .25;
      if (isEmoji) {
        c.textContent = THEME_PARTICLES[html.dataset.theme][Math.floor(Math.random() * 5)];
        c.style.fontSize = (14 + Math.random() * 16) + 'px';
      } else {
        c.style.width = (7 + Math.random() * 8) + 'px';
        c.style.height = (10 + Math.random() * 8) + 'px';
        c.style.borderRadius = Math.random() < .5 ? '50%' : '3px';
        c.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      }
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-4vh';
      c.style.setProperty('--cx', (Math.random() * 240 - 120) + 'px');
      c.style.animationDuration = (2.2 + Math.random() * 2.4) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }
  byId('cake').addEventListener('click', () => burstConfetti());

  /* ================= 惊喜解锁 ================= */
  const SECRET = '胡紫仙';
  const surprise = byId('surprise');
  const nameRain = byId('name-rain');
  let unlocked = false;

  function showStage(n) {
    document.querySelectorAll('.surprise-stage').forEach(s => {
      s.classList.toggle('active', s.dataset.stage === String(n));
    });
  }

  const RAIN_COLORS = ['#f04d8a', '#ff6fa5', '#8f6fff', '#c86fd8', '#ff8fb8'];
  function rainNames() {
    nameRain.innerHTML = '';
    for (let i = 0; i < 34; i++) {
      const s = document.createElement('span');
      s.textContent = SECRET;
      s.style.left = (Math.random() * 96) + 'vw';
      s.style.fontSize = (15 + Math.random() * 34) + 'px';
      s.style.color = RAIN_COLORS[Math.floor(Math.random() * RAIN_COLORS.length)];
      s.style.setProperty('--sway', (Math.random() * 90 - 45) + 'px');
      s.style.setProperty('--r0', (Math.random() * 40 - 20) + 'deg');
      s.style.setProperty('--r1', (Math.random() * 24 - 12) + 'deg');
      s.style.setProperty('--op', .35 + Math.random() * .5);
      s.style.animationDuration = (3.2 + Math.random() * 3.4) + 's';
      s.style.animationDelay = (Math.random() * 4 - 3.5) + 's';
      nameRain.appendChild(s);
    }
  }

  /* ----- 震动 ----- */
  function shake(pattern) {
    surprise.classList.remove('shake');
    void surprise.offsetWidth;
    surprise.classList.add('shake');
    if (navigator.vibrate) navigator.vibrate(pattern || [80, 40, 80]);
  }

  /* ----- 背景音乐(WebAudio 八音盒,无需音频文件) ----- */
  let audioCtx = null, musicTimer = null, masterGain = null;
  const MELODY = [ // [音高(半音,相对C5), 拍数] 生日快乐歌
    [0,.75],[0,.25],[2,1],[0,1],[5,1],[4,2],
    [0,.75],[0,.25],[2,1],[0,1],[7,1],[5,2],
    [0,.75],[0,.25],[12,1],[9,1],[5,1],[4,1],[2,2],
    [10,.75],[10,.25],[9,1],[5,1],[7,1],[5,2],
  ];
  function playNote(semi, dur, when) {
    const f = 523.25 * Math.pow(2, semi / 12);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(.5, when + .02);
    g.gain.exponentialRampToValueAtTime(.001, when + dur * .95);
    // 泛音让音色更像八音盒
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = f * 3;
    g2.gain.setValueAtTime(0, when);
    g2.gain.linearRampToValueAtTime(.08, when + .02);
    g2.gain.exponentialRampToValueAtTime(.001, when + dur * .6);
    osc.connect(g).connect(masterGain);
    osc2.connect(g2).connect(masterGain);
    osc.start(when); osc.stop(when + dur);
    osc2.start(when); osc2.stop(when + dur);
  }
  function startMusic() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = .55;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const BEAT = .42;
      const schedule = () => {
        let t = audioCtx.currentTime + .1;
        MELODY.forEach(([semi, beats]) => {
          playNote(semi, beats * BEAT * 1.15, t);
          t += beats * BEAT;
        });
        return (t - audioCtx.currentTime) * 1000;
      };
      const loop = () => { musicTimer = setTimeout(loop, schedule() + 600); };
      loop();
    } catch (e) { /* 音频不可用时静默降级 */ }
  }
  function stopMusic() {
    clearTimeout(musicTimer);
    musicTimer = null;
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, .4);
      setTimeout(() => { if (masterGain) masterGain.gain.value = .55; audioCtx.suspend(); }, 1500);
    }
  }

  function unlockSurprise() {
    if (unlocked) return; // 防止动画播放过程中重复触发
    unlocked = true;
    surprise.classList.add('show');
    showStage(1);
    burstConfetti(70);
    startMusic();          // 由用户输入触发,可自动播放
    shake([90, 50, 90]);
    setTimeout(() => { showStage(2); rainNames(); shake([60, 40, 60, 40, 120]); }, 2400);
    setTimeout(() => { showStage(3); shake([200]); }, 5000);
  }

  byId('enter-btn').addEventListener('click', () => {
    surprise.classList.remove('show');
    nameRain.innerHTML = '';
    stopMusic();
    burstConfetti(180);
    unlocked = false; // 允许重新输入名字后再次触发
  });

  /* ================= 名字记忆 ================= */
  const nameEl = byId('girl-name');
  const savedName = localStorage.getItem('bday-name');
  if (savedName) nameEl.textContent = savedName;
  nameEl.addEventListener('input', () => {
    if (nameEl.textContent.trim() === SECRET) unlockSurprise();
  });
  nameEl.addEventListener('blur', () => {
    const v = nameEl.textContent.trim() || '小可爱';
    nameEl.textContent = v;
    localStorage.setItem('bday-name', v);
  });
  nameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
  });

  /* ================= 初始化 ================= */
  setTheme(localStorage.getItem('bday-theme') || 'strawberry');
</script>
</body>
</html>
